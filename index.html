    <title>Zylen — Tu mejor versión, tu mayor aventura</title>

    <!-- Apply persisted theme before first paint to prevent flash of wrong theme.
         Keep this dependency-free; it mirrors src/utils/theme.ts. -->
    <script>
      (function () {
        try {
          // Dual-read during the Zylen → Everlight migration: prefer the new
          // key, fall back to the legacy one so there's no theme flash on the
          // first load (before the JS migration copies the value across).
          var raw = localStorage.getItem('everlight_theme') || localStorage.getItem('zylen_theme');
          var t = raw ? JSON.parse(raw) : 'midnight';
          var allowed = ['nous', 'midnight', 'ember', 'mono', 'cyberpunk', 'slate'];
          document.documentElement.setAttribute(
            'data-theme',
            allowed.indexOf(t) > -1 ? t : 'midnight'
          );
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'midnight');
        }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
